<!DOCTYPE html>
<html>
<head> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian Pizza & Burger</title>

<style>
body{margin:0;font-family:Arial;background:#0d0d0d;color:white}
header{text-align:center;padding:20px;border-bottom:2px solid silver}
header img{width:120px}
nav{display:flex;overflow:auto;background:#111;padding:10px;position:sticky;top:0;z-index:10}
nav button{background:#222;color:white;border:none;padding:8px 15px;margin-right:8px;border-radius:20px;cursor:pointer}
nav button:hover{background:orange}
.section{padding:15px}
.item{background:#1a1a1a;padding:15px;margin-bottom:12px;border-radius:10px}
select,input{padding:6px;margin-top:5px;border-radius:5px;border:none}
button.add{background:orange;border:none;padding:6px 12px;color:white;border-radius:6px;margin-top:5px;cursor:pointer}
.remove{background:red;color:white;border:none;padding:4px 8px;margin-left:8px;border-radius:4px}
.whatsapp{background:green;width:100%;padding:12px;border:none;color:white;margin-top:8px;border-radius:6px;font-size:16px}

/* SLIDING CART */
.cart{
position:fixed;
bottom:-100%;
left:0;
right:0;
background:#111;
padding:15px;
border-top:2px solid silver;
max-height:60vh;
overflow:auto;
transition:0.4s;
z-index:1000;
box-shadow:0 -5px 20px rgba(0,0,0,0.6);
}
.cart.active{bottom:0;}

footer{background:#111;padding:20px;margin-top:80px}
iframe{width:100%;height:280px;border:0;margin-top:10px}
h2{border-left:4px solid orange;padding-left:8px}
</style>
</head>

<body>

<header>
<img src="E3215E75-7724-4920-B026-F1F21CFB242E.png">
<h1>Canadian Pizza & Burger</h1>
<p>Banda Road, Khutar, Shahjahanpur</p>
<p>📞 +91 7992007113</p>
</header>

<nav>
<button onclick="showSection('pizza')">Pizza</button>
<button onclick="showSection('burger')">Burger</button>
<button onclick="showSection('chinese')">Chinese</button>
<button onclick="showSection('shakes')">Shakes</button>
<button onclick="showSection('pasta')">Pasta</button>
<button onclick="showSection('wrap')">Wrap</button>
<button onclick="showSection('kulhad')">Kulhad</button>
<button onclick="showSection('meals')">Meals</button>
</nav>

<div id="menuContainer"></div>

<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartItems"></div>
<h3>Total: ₹<span id="total">0</span></h3>
<button class="whatsapp" onclick="orderWhatsApp()">Order on WhatsApp</button>
</div>

<footer>
<h2>About Us</h2>
<p>Fresh & hygienic pizzas, burgers, Chinese, shakes and more. Affordable pricing with quick service.</p>

<h2>Contact</h2>
<p>📍 Banda Road, Khutar, Shahjahanpur</p>
<p>📞 +91 7992007113</p>

<h2>Our Location</h2>
<iframe src="https://www.google.com/maps?q=Banda%20road,%20Khutar,%20Narainpur%20Vikrampur,%20Uttar%20Pradesh%20242405&output=embed"></iframe>
</footer>

<script>

const menuData = {

pizza:{
"Margherita":{Small:60,Regular:80,Medium:170,Large:270},
"Tomato":{Small:60,Regular:90,Medium:180,Large:280},
"Sweet Corn":{Small:60,Regular:90,Medium:180,Large:280},
"Onion":{Regular:150,ExtraRegular:170,Medium:250,Large:350},
"Sweet Corn Paneer":{Regular:160,ExtraRegular:180,Medium:260,Large:360},
"Mushroom":{Regular:150,ExtraRegular:170,Medium:250,Large:360},
"Paneer":{Regular:160,ExtraRegular:180,Medium:270,Large:450},
"Paneer Makhani":{Regular:170,ExtraRegular:180,Medium:280,Large:460},
"Black Olive":{Regular:170,ExtraRegular:190,Medium:280,Large:460},
"Mexicana":{Regular:180,ExtraRegular:190,Medium:290,Large:450},
"Jumbo":{Regular:180,ExtraRegular:200,Medium:310,Large:480},
"Paneer Do Pyaza":{Regular:180,ExtraRegular:210,Medium:310,Large:480},
"Farm Fresh":{Regular:190,ExtraRegular:220,Medium:320,Large:490},
"Tandoori":{Regular:200,ExtraRegular:220,Medium:330,Large:510},
"Achari":{Regular:200,ExtraRegular:220,Medium:330,Large:510},
"Special Four Cheese":{Regular:210,ExtraRegular:230,Medium:350,Large:480},
"Canadian Spicy":{Regular:220,ExtraRegular:240,Medium:360,Large:500},
"Punjabi":{Regular:230,ExtraRegular:280,Medium:350,Large:510}
},

burger:{
"Happy Price":40,"Regular":50,"Noodle":60,"Special":70,
"Royal":80,"Chizzy":100,"Canadian Double Decker":130
},

chinese:{
"Veg Noodles":50,"Paneer Noodles":80,"Haaka Noodles":70,
"Special Haaka Noodles":100,"Dry Manchurian":60,
"Gravy Manchurian":70,"Fried Rice":70,
"Paneer Fried Rice":90,"Fried Rice + Manchurian":120,
"Chilli Potato":60,"Chilli Paneer Half":90,"Chilli Paneer Full":160
},

shakes:{
"Cold Coffee (Regular)":50,"Cold Coffee (Special)":100,
"Strawberry (Regular)":60,"Strawberry (Special)":110,
"Chocolate (Regular)":70,"Chocolate (Special)":120,
"Oreo (Regular)":70,"Oreo (Special)":120,
"Butter Scotch (Regular)":80,"Butter Scotch (Special)":130,
"Mango (Regular)":70,"Mango (Special)":120,
"Kiwi (Regular)":90,"Kiwi (Special)":140,
"Banana (Regular)":70,"Banana (Special)":120,
"Black Currant (Regular)":120,"Black Currant (Special)":150,
"Pineapple (Regular)":70,"Pineapple (Special)":120
},

pasta:{
"White Pasta":90,"Mix Pasta":100,"Tandoori Pasta":110,
"Pari Pari Pasta":120,"Makhani Pasta":120,
"Canadian Special Pasta":140
},

wrap:{
"Veg Wrap":70,"Tosho Wrap":80,"Paneer Wrap":90,
"Punjabi Wrap":100,"Special Wrap":110
},

kulhad:{
"Veg Kulhad Pizza":50,"Tandoori Kulhad Pizza":70,
"Paneer Kulhad Pizza":120
},

meals:{
"Jumbo Pizza Regular + Fries + 750ml Coke":340,
"Jumbo Pizza Medium + Fries + 750ml Coke":430,
"Any Regular Pizza + Fries + 750ml Coke":380,
"Any Medium Pizza + Fries + 750ml Coke":480,
"Royal Burger + Fries + 250ml Coke":150
}

};

let cart=[];
let total=0;
const cartBox=document.querySelector(".cart");

function showSection(section){
let html="<div class='section'><h2>"+section.toUpperCase()+"</h2>";
for(let item in menuData[section]){
html+="<div class='item'><b>"+item+"</b><br>";
if(typeof menuData[section][item]==="object"){
html+="<select id='"+item+"size'>";
for(let size in menuData[section][item]){
html+="<option value='"+menuData[section][item][size]+"'>"+size+" - ₹"+menuData[section][item][size]+"</option>";
}
html+="</select>";
}else{
html+="₹"+menuData[section][item];
}
html+="<br><input type='number' min='1' value='1' id='"+item+"qty'>";
html+="<br><button class='add' onclick=\"addItem('"+section+"','"+item+"')\">Add</button>";
html+="</div>";
}
html+="</div>";
document.getElementById("menuContainer").innerHTML=html;
}

function addItem(section,item){
let price=typeof menuData[section][item]==="object"
?parseInt(document.getElementById(item+"size").value)
:menuData[section][item];

let qty=parseInt(document.getElementById(item+"qty").value);

cart.push({name:item,qty:qty,price:price});
total+=price*qty;
updateCart();
}

function updateCart(){
let html="";
cart.forEach((c,index)=>{
html+=c.name+" x"+c.qty+" = ₹"+(c.price*c.qty)
+" <button class='remove' onclick='removeItem("+index+")'>X</button><br>";
});
document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;

cart.length>0
?cartBox.classList.add("active")
:cartBox.classList.remove("active");
}

function removeItem(index){
total-=cart[index].price*cart[index].qty;
cart.splice(index,1);
updateCart();
}

function orderWhatsApp(){
if(cart.length===0){alert("Cart is empty");return;}
let message="Order:%0A";
cart.forEach(c=>{
message+=c.name+" x"+c.qty+" - ₹"+(c.price*c.qty)+"%0A";
});
message+="Total: ₹"+total;
window.open("https://wa.me/917992007113?text="+message);
}

showSection('pizza');

</script>

</body>
</html>
