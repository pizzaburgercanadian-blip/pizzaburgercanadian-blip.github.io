<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canadian Pizza & Burger</title> 

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0f19;
  color:white;
}

header{
  background:#111827;
  padding:20px;
  text-align:center;
}

header h1{
  color:#ff7a18;
  margin:0;
}

.search-box input{
  width:90%;
  padding:12px;
  margin-top:15px;
  border-radius:25px;
  border:none;
  background:#1f2937;
  color:white;
}

.section{
  padding:20px;
}

.section h2{
  color:#ff7a18;
  border-left:4px solid #ff7a18;
  padding-left:10px;
}

.card{
  background:#1f2937;
  padding:15px;
  border-radius:15px;
  margin-bottom:15px;
}

.card h3{
  margin:0 0 8px 0;
}

select,input{
  padding:8px;
  border-radius:8px;
  border:none;
  margin-top:5px;
}

.add-btn{
  background:#ff7a18;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:10px;
  cursor:pointer;
  margin-left:10px;
}

.cart-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ff7a18;
  color:white;
  padding:18px;
  border:none;
  border-radius:50%;
  font-size:18px;
}

.cart-panel{
  position:fixed;
  right:-100%;
  top:0;
  width:320px;
  height:100%;
  background:#111827;
  padding:20px;
  transition:0.3s;
  overflow-y:auto;
}

.cart-panel.active{
  right:0;
}

.cart-item{
  margin-bottom:10px;
}

.total{
  font-weight:bold;
  margin-top:15px;
}
</style>
</head>

<body>

<header>
<h1>Canadian Pizza & Burger</h1>
<p>📍 Banda Road, Khutar, Shahjahanpur – 242405</p>
<p>📞 +91 7992007113</p>
<p>🕒 Open Daily: 10:00 AM – 11:00 PM</p>

<div class="search-box">
<input type="text" placeholder="Search food..." onkeyup="searchFood(this.value)">
</div>
</header>

<div id="menu"></div>

<div class="cart-panel" id="cartPanel">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="total">0</span></div>
<br>
<button class="add-btn" onclick="sendWhatsApp()">Order on WhatsApp</button>
</div>

<button class="cart-btn" onclick="toggleCart()">🛒</button>

<script>

const menuData = {
"Pizza":[
{name:"Onion Pizza",sizes:{Regular:150,Medium:250,Large:350}},
{name:"Paneer Pizza",sizes:{Regular:160,Medium:270,Large:450}},
{name:"Farm Fresh Pizza",sizes:{Regular:190,Medium:320,Large:490}},
{name:"Margherita Pizza",sizes:{Regular:80,Medium:170,Large:270}}
],
"Burger":[
{name:"Happy Price Burger",price:40},
{name:"Royal Burger",price:80},
{name:"Canadian Double Decker",price:130}
],
"Chinese":[
{name:"Veg Noodles",price:50},
{name:"Fried Rice",price:70},
{name:"Chilli Paneer",price:160}
],
"Shakes":[
{name:"Cold Coffee",price:50},
{name:"Oreo Shake",price:120},
{name:"Mango Shake",price:120}
],
"Tea & Coffee":[
{name:"Tea",price:20},
{name:"Kulhad Special Tea",price:30},
{name:"Hot Coffee",price:30}
]
};

const menuDiv = document.getElementById("menu");

Object.keys(menuData).forEach(category=>{
  let section = `<div class="section"><h2>${category}</h2>`;
  
  menuData[category].forEach((item,i)=>{
    section += `<div class="card"><h3>${item.name}</h3>`;
    
    if(item.sizes){
      section += `<select id="${category+i}">`;
      Object.keys(item.sizes).forEach(size=>{
        section += `<option value="${item.sizes[size]}">${size} - ₹${item.sizes[size]}</option>`;
      });
      section += `</select>`;
    }
    
    section += `
    <input type="number" id="qty${category+i}" value="1" min="1">
    <button class="add-btn" onclick="addToCart('${category}','${item.name}','${category+i}')">Add</button>
    </div>`;
  });
  
  section += `</div>`;
  menuDiv.innerHTML += section;
});

let cart = [];

function addToCart(category,name,id){
  let qty = parseInt(document.getElementById("qty"+id).value);
  let price;
  
  let select = document.getElementById(id);
  if(select){
    price = parseInt(select.value);
    name += " (" + select.options[select.selectedIndex].text.split(" - ")[0] + ")";
  } else {
    price = menuData[category].find(i=>i.name===name).price;
  }

  cart.push({name,price,qty});
  renderCart();
}

function renderCart(){
  let items = document.getElementById("cartItems");
  let total = 0;
  items.innerHTML = "";
  
  cart.forEach(item=>{
    total += item.price * item.qty;
    items.innerHTML += `<div class="cart-item">${item.name} x${item.qty} - ₹${item.price * item.qty}</div>`;
  });
  
  document.getElementById("total").innerText = total;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("active");
}

function sendWhatsApp(){
  if(cart.length==0){
    alert("Cart is empty");
    return;
  }
  
  let msg = "Order Details:%0A";
  let total = 0;
  
  cart.forEach(item=>{
    total += item.price * item.qty;
    msg += `${item.name} x${item.qty} - ₹${item.price * item.qty}%0A`;
  });
  
  msg += `%0ATotal: ₹${total}`;
  
  window.open("https://wa.me/917992007113?text="+msg);
}

function searchFood(value){
  value = value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
  });
}

</script>

</body>
</html>
